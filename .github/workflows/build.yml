name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: pyinstaller upc_gen.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UPCGen-Windows
          path: dist/UPCGen.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Mac icon (icns)
        run: |
          mkdir -p iconset.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size assets/icon.png --out iconset.iconset/icon_${size}x${size}.png
          done
          sips -z 32  32  assets/icon.png --out iconset.iconset/icon_16x16@2x.png
          sips -z 64  64  assets/icon.png --out iconset.iconset/icon_32x32@2x.png
          sips -z 256 256 assets/icon.png --out iconset.iconset/icon_128x128@2x.png
          sips -z 512 512 assets/icon.png --out iconset.iconset/icon_256x256@2x.png
          iconutil -c icns iconset.iconset -o assets/icon.icns

      - name: Build Mac app
        run: pyinstaller upc_gen.spec

      - name: Smoke test
        run: dist/UPCGen.app/Contents/MacOS/UPCGen --smoke-test

      - name: Zip app bundle
        run: cd dist && zip -r UPCGen-Mac.zip UPCGen.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UPCGen-Mac
          path: dist/UPCGen-Mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            UPCGen-Windows/UPCGen.exe
            UPCGen-Mac/UPCGen-Mac.zip
